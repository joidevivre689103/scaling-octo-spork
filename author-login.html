<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Author Login — Cricket Times</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FAF7F2;
      --cream-dark: #F0EBE3;
      --ink: #1a1a1a;
      --ink-light: #4a4a4a;
      --crimson: #8B0000;
      --crimson-dark: #6B0000;
      --gold: #C9A227;
      --rule: #d4d0c8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .login-card {
      background: white;
      border: 1px solid var(--rule);
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .masthead {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.25rem;
      letter-spacing: -0.02em;
    }

    .masthead a {
      color: var(--ink);
      text-decoration: none;
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .portal-label {
      display: inline-block;
      background: var(--crimson);
      color: white;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .divider span {
      font-size: 0.75rem;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .form-group {
      margin-bottom: 1rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink-light);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1rem;
      border: 1px solid var(--rule);
      background: var(--cream);
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--crimson);
    }

    .login-btn {
      width: 100%;
      padding: 0.95rem;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      background: var(--crimson);
      color: white;
      border: none;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .login-btn:hover:not(:disabled) {
      background: var(--crimson-dark);
    }

    .login-btn:disabled {
      background: #999;
      cursor: wait;
    }

    .error-msg {
      color: var(--crimson);
      font-size: 0.9rem;
      margin-top: 1rem;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .forgot-link {
      display: block;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--ink-light);
    }

    .forgot-link a {
      color: var(--crimson);
      text-decoration: none;
    }

    .forgot-link a:hover {
      text-decoration: underline;
    }

    .home-link {
      display: block;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
      font-size: 0.85rem;
      color: var(--ink-light);
    }

    .home-link a {
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
    }

    .home-link a:hover {
      color: var(--crimson);
    }

    /* Loading state */
    .loading {
      display: none;
      text-align: center;
      padding: 2rem 0;
    }

    .loading.show {
      display: block;
    }

    .loading p {
      color: var(--ink-light);
      font-style: italic;
    }

    .login-form.hidden {
      display: none;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
      }

      .masthead {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="masthead"><a href="stories.html">Cricket Times</a></div>
      <p class="tagline">Est. 2026</p>
      <span class="portal-label">Author Portal</span>

      <!-- Loading state (shown while checking auth) -->
      <div class="loading" id="loading">
        <p>Checking session...</p>
      </div>

      <!-- Login form -->
      <div class="login-form" id="login-form">
        <div class="divider"><span>Sign In</span></div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="login-btn" id="login-btn">Sign In</button>

        <p class="error-msg" id="error-msg"></p>

        <p class="forgot-link">
          Forgot your password? <a href="#" id="reset-link">Reset it here</a>
        </p>
      </div>

      <p class="home-link">
        ← <a href="stories.html">Back to Cricket Times</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBnfn9hK0y-p6nvIZ_AwoJnWD7DfDuIQd4",
      authDomain: "hitwicket-cba02.firebaseapp.com",
      projectId: "hitwicket-cba02",
      storageBucket: "hitwicket-cba02.firebasestorage.app",
      messagingSenderId: "196915483829",
      appId: "1:196915483829:web:071c47af79914aec88dafc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // DOM elements
    const loading = document.getElementById('loading');
    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');
    const resetLink = document.getElementById('reset-link');

    // Show loading while checking auth state
    loading.classList.add('show');
    loginForm.classList.add('hidden');

    // Check if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Already signed in — redirect to dashboard
        window.location.href = 'author-dashboard.html';
      } else {
        // Not signed in — show login form
        loading.classList.remove('show');
        loginForm.classList.remove('hidden');
      }
    });

    // Login handler
    loginBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';
      hideError();

      try {
        await signInWithEmailAndPassword(auth, email, password);
        // onAuthStateChanged will redirect to dashboard
      } catch (err) {
        console.error(err);
        showError(friendlyError(err.code));
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });

    // Enter key to submit
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });

    emailInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') passwordInput.focus();
    });

    // Password reset
    resetLink.addEventListener('click', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();

      if (!email) {
        showError('Enter your email address first, then click reset.');
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        showError('Password reset email sent. Check your inbox.');
        errorMsg.style.color = '#2e7d32'; // Green for success
      } catch (err) {
        console.error(err);
        showError(friendlyError(err.code));
      }
    });

    // Helpers
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.color = '#8B0000';
      errorMsg.classList.add('show');
    }

    function hideError() {
      errorMsg.classList.remove('show');
    }

    function friendlyError(code) {
      const map = {
        'auth/invalid-email': 'Invalid email address.',
        'auth/user-not-found': 'No account found with this email.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/invalid-credential': 'Invalid email or password.',
        'auth/invalid-login-credentials': 'Invalid email or password.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
        'auth/missing-email': 'Please enter an email address.'
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>

</body>
</html>
