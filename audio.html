<script type="module">

  /* ── helpers ── */
  function formatDate(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }
  function fmtTime(sec) {
    if (isNaN(sec)) return '0:00';
    const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2,'0')}`;
  }
  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function highlight(text, q) {
    if (!q) return escHtml(text);
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return escHtml(text).replace(re, '<mark>$1</mark>');
  }

  /* ── global audio state ── */
  let currentAudio = null;
  let currentCardEl = null;
  const SPEED_STEPS = [1, 1.5, 2];
  let currentSpeed = 1;

  function speedLabel(r) {
    return (r % 1 === 0 ? r.toFixed(0) : r.toString()) + '×';
  }

  function stopAll() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    if (currentCardEl) { currentCardEl.classList.remove('playing'); currentCardEl = null; }
    document.getElementById('nowPlayingBar').classList.remove('visible');
  }

  document.getElementById('nowPlayingClose').addEventListener('click', stopAll);

  function initPlayer(card, audioUrl, title) {
    const playBtn = card.querySelector('.play-btn');
    const progress = card.querySelector('.track-progress');
    const barWrap = card.querySelector('.track-bar-wrap');
    const timeEl = card.querySelector('.time-current');
    const durEl = card.querySelector('.time-duration');
    const speedBtn = card.querySelector('.speed-btn');

    // Use the pre-rendered <audio> element with preload="metadata"
    const audio = card.querySelector('audio');
    let playing = false;
    let knownDuration = NaN;
    let probeStarted = false; // have we issued the seek-to-end probe yet?

    function hasDuration() {
      return isFinite(knownDuration) && knownDuration > 0;
    }

    // Try every source the browser exposes. For Firebase-streamed audio,
    // audio.duration often stays Infinity forever — but after a seek probe,
    // audio.seekable.end(0) reliably reports the real total in seconds.
    function readDurationFromElement() {
      if (isFinite(audio.duration) && audio.duration > 0) return audio.duration;
      try {
        if (audio.seekable && audio.seekable.length > 0) {
          const end = audio.seekable.end(audio.seekable.length - 1);
          if (isFinite(end) && end > 0) return end;
        }
      } catch (e) { /* ignore */ }
      return NaN;
    }

    function captureDuration() {
      if (hasDuration()) return;
      const d = readDurationFromElement();
      if (isFinite(d) && d > 0) {
        knownDuration = d;
        durEl.textContent = fmtTime(d);
      }
    }

    function updateProgress() {
      // Until we have a real duration, don't paint anything. This keeps the
      // bar at 0% while the duration probe's transient currentTime values
      // are flowing through, avoiding the "zip to end" flicker.
      if (!hasDuration()) return;
      timeEl.textContent = fmtTime(audio.currentTime);
      const pct = Math.max(0, Math.min(100, (audio.currentTime / knownDuration) * 100));
      progress.style.width = pct + '%';
    }

    function setPlayIcon(isPlaying) {
      playBtn.innerHTML = isPlaying
        ? `<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
        : `<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>`;
    }

    // Pauses & resets UI for *this* card. Safe to call when already paused.
    function pauseThis() {
      audio.pause();
      playing = false;
      setPlayIcon(false);
      card.classList.remove('playing');
    }

    // Issue the duration probe: seek past the end so the browser resolves
    // the real duration (exposed via audio.seekable even when audio.duration
    // stays Infinity, as with chunked/streamed Firebase audio).
    function startDurationProbe() {
      if (probeStarted || hasDuration() || playing) return;
      probeStarted = true;
      try { audio.currentTime = 1e9; } catch (e) { /* ignore */ }
    }

    audio.addEventListener('loadedmetadata', () => {
      captureDuration();
      if (!hasDuration()) startDurationProbe();
    });
    audio.addEventListener('durationchange', captureDuration);
    audio.addEventListener('canplay', () => {
      captureDuration();
      if (!hasDuration()) startDurationProbe();
    });
    audio.addEventListener('progress', captureDuration);
    // `seeked` fires when the probe's seek-to-end completes. seekable is
    // populated at this point, so we can read duration from it.
    audio.addEventListener('seeked', () => {
      captureDuration();
      // If the probe left us near the (now known) end and the user hasn't
      // pressed play, rewind to 0. The progress bar has been suppressed up
      // to this point, so the user never saw the probe's scan position.
      if (hasDuration() && !playing && audio.currentTime > knownDuration - 1) {
        try { audio.currentTime = 0; } catch (e) { /* ignore */ }
      }
    });
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', () => {
      pauseThis();
      progress.style.width = '0%';
      timeEl.textContent = '0:00';
      try { audio.currentTime = 0; } catch (e) { /* ignore */ }
      if (currentAudio === audio) {
        currentAudio = null;
        currentCardEl = null;
        document.getElementById('nowPlayingBar').classList.remove('visible');
      }
    });
    audio.addEventListener('error', () => {
      console.warn('Audio error for', title, audio.error);
    });

    // Kick off metadata loading, then poll as a final fallback if no event
    // ever yields a usable duration.
    audio.load();
    const pollDur = setInterval(() => {
      if (hasDuration()) { clearInterval(pollDur); return; }
      captureDuration();
      if (hasDuration()) { clearInterval(pollDur); return; }
      // Still nothing? Kick off the probe if we haven't already.
      if (!probeStarted && audio.readyState >= 1) startDurationProbe();
    }, 400);
    setTimeout(() => clearInterval(pollDur), 20000);

    // Expose a pause-this-track hook so the play handler below can stop a
    // different card cleanly without reaching into its internals.
    card._pausePlayer = pauseThis;

    playBtn.addEventListener('click', () => {
      // Switching tracks: pause the previous one cleanly
      if (currentAudio && currentAudio !== audio) {
        if (currentCardEl && typeof currentCardEl._pausePlayer === 'function') {
          currentCardEl._pausePlayer();
        } else if (currentAudio) {
          currentAudio.pause();
        }
        currentAudio = null;
        currentCardEl = null;
      }

      if (playing) {
        pauseThis();
        document.getElementById('nowPlayingBar').classList.remove('visible');
        currentAudio = null;
        currentCardEl = null;
      } else {
        audio.playbackRate = currentSpeed;
        const p = audio.play();
        if (p && typeof p.then === 'function') {
          p.catch(err => {
            console.warn('Playback blocked/failed for', title, err);
            pauseThis();
          });
        }
        playing = true;
        currentAudio = audio;
        currentCardEl = card;
        setPlayIcon(true);
        card.classList.add('playing');
        document.getElementById('nowPlayingTitle').textContent = title;
        document.getElementById('nowPlayingBar').classList.add('visible');
      }
    });

    // ── Seek ──
    function clientXToTime(clientX) {
      const rect = barWrap.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      return { pct, time: hasDuration() ? pct * knownDuration : null };
    }

    function seekTo(clientX) {
      const { pct, time } = clientXToTime(clientX);
      progress.style.width = (pct * 100) + '%';
      if (time !== null) {
        try { audio.currentTime = time; } catch (e) { /* ignore */ }
        timeEl.textContent = fmtTime(time);
      }
    }

    // Click to seek
    barWrap.addEventListener('click', (e) => seekTo(e.clientX));

    // Drag to seek — listeners are attached to the document only while a drag
    // is in progress, then removed. This avoids the listener leak that would
    // otherwise accumulate every time render() re-creates cards.
    function onMove(e) {
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      seekTo(x);
      if (e.cancelable) e.preventDefault();
    }
    function onEnd() {
      card.classList.remove('scrubbing');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
      document.removeEventListener('touchcancel', onEnd);
    }

    barWrap.addEventListener('mousedown', (e) => {
      card.classList.add('scrubbing');
      seekTo(e.clientX);
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      e.preventDefault();
    });
    barWrap.addEventListener('touchstart', (e) => {
      card.classList.add('scrubbing');
      seekTo(e.touches[0].clientX);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
      document.addEventListener('touchcancel', onEnd);
      e.preventDefault();
    }, { passive: false });

    // ── Speed control ──
    function applySpeed() {
      audio.playbackRate = currentSpeed;
      speedBtn.textContent = speedLabel(currentSpeed);
      speedBtn.classList.toggle('boosted', currentSpeed !== 1);
      speedBtn.setAttribute('aria-label', `Playback speed: ${speedLabel(currentSpeed)}. Click to change.`);
    }
    applySpeed();
    speedBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = SPEED_STEPS.indexOf(currentSpeed);
      currentSpeed = SPEED_STEPS[(idx + 1) % SPEED_STEPS.length];
      // Apply to every player on the page so the session shares the setting
      document.querySelectorAll('.audio-card').forEach(c => {
        const a = c.querySelector('audio');
        const b = c.querySelector('.speed-btn');
        if (a) a.playbackRate = currentSpeed;
        if (b) {
          b.textContent = speedLabel(currentSpeed);
          b.classList.toggle('boosted', currentSpeed !== 1);
        }
      });
    });

    // Re-assert speed whenever playback (re)starts — some browsers reset it
    audio.addEventListener('play', () => { audio.playbackRate = currentSpeed; });

    setPlayIcon(false);
  }

  /* ── data & render ── */
  let allAudio = [];

  function render(q) {
    const term = (q||'').toLowerCase();
    const filtered = allAudio.filter(a =>
      !term
      || (a.headline||'').toLowerCase().includes(term)
      || (a.summary||'').toLowerCase().includes(term)
      || (a.category||'').toLowerCase().includes(term)
    );

    const container = document.getElementById('audioContainer');
    document.getElementById('audioCount').textContent =
      `${filtered.length} recording${filtered.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state">
        <div class="icon">🎙</div>
        <h3>No recordings found</h3>
        <p>Try a different search term.</p>
      </div>`;
      return;
    }

    container.innerHTML = filtered.map((a, i) => {
      const num = String(i + 1).padStart(2, '0');
      const date = a.date || formatDate(a.createdAt);
      const dur = a.duration ? `<span>${escHtml(a.duration)}</span>` : '';
      const articleLink = a.articleId
        ? `<a class="card-article-link" href="article.html?id=${escHtml(a.articleId)}">Read the article</a>`
        : '';

      return `
        <div class="audio-card" data-id="${escHtml(a.id)}" data-url="${escHtml(a.audioUrl || '')}">
          <div class="card-number">${num}</div>
          <div class="card-content">
            ${a.category ? `<div class="card-kicker">${highlight(a.category, term)}</div>` : ''}
            <div class="card-title">${highlight(a.headline || 'Untitled', term)}</div>
            <div class="card-meta">
              ${date ? `<span>${date}</span>` : ''}
              ${dur}
            </div>
            ${a.summary ? `<div class="card-summary">${highlight(a.summary, term)}</div>` : ''}
            ${articleLink}
            <div class="audio-player">
              <button class="play-btn" aria-label="Play ${escHtml(a.headline||'audio')}">
                <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
              </button>
              <div class="player-track">
                <div class="track-bar-wrap" role="slider" aria-label="Seek">
                  <div class="track-progress"></div>
                </div>
                <div class="track-times">
                  <span class="time-elapsed"><span class="time-current">0:00</span> / <span class="time-duration">--:--</span></span>
                  <button class="speed-btn" type="button" aria-label="Playback speed">1×</button>
                </div>
              </div>
              <audio preload="metadata" src="${escHtml(a.audioUrl || '')}" style="display:none"></audio>
            </div>
          </div>
        </div>`;
    }).join('');

    // init players
    container.querySelectorAll('.audio-card').forEach((card, i) => {
      const url = card.dataset.url;
      const title = filtered[i].headline || 'Untitled';
      if (url) initPlayer(card, url, title);
    });
  }

  document.getElementById('audioSearch').addEventListener('input', function(){ render(this.value); });

  /* ── load from Firestore ── */
  async function load() {
    try {
      // Reuse the default app if already initialised (e.g. by
      // prelaunch-guard.js); otherwise create. Without this, the second
      // initializeApp throws "already exists".
      let app;
      try { app = getApp(); } catch (e) { app = initializeApp(firebaseConfig); }
      const db = getFirestore(app);
      // The audio archive is the audio equivalent of the article archive:
      // every article that has ever been published, filtered client-side
      // to those with audio. Mirrors archive.html's everPublished query.
      // Withdrawn articles still appear here as long as audioEnabled is
      // true — matching how the article archive treats text.
      const snap = await getDocs(query(
        collection(db, 'articles'),
        where('everPublished', '==', true)
      ));
      allAudio = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(a => a.audioUrl && a.audioEnabled)
        .sort((a, b) => {
          const ta = a.date ? new Date(a.date).getTime() : (a.createdAt?.toDate ? a.createdAt.toDate() : new Date(0)).getTime();
          const tb = b.date ? new Date(b.date).getTime() : (b.createdAt?.toDate ? b.createdAt.toDate() : new Date(0)).getTime();
          return tb - ta; // newest first
        });
    } catch (err) {
      console.error('Firestore load error:', err);
      document.getElementById('audioContainer').innerHTML = `<div class="empty-state">
        <div class="icon">⚠️</div>
        <h3>Could not load audio</h3>
        <p style="font-family:monospace;font-size:12px;margin-top:8px;color:#8b1a1a">${err.message}</p>
      </div>`;
      document.getElementById('loadingState')?.remove();
      return;
    }
    document.getElementById('loadingState').remove();
    render('');
  }

  load();
</script>
<script src="ct-nav.js"></script>
</body>
</html>
